<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TrackCompare — 5000m</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d0d;
      color: #ccc;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 12px;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      align-items: baseline;
      gap: 12px;
      padding: 9px 16px;
      background: #161616;
      border-bottom: 1px solid #222;
      flex-shrink: 0;
    }

    header h1 { font-size: 15px; font-weight: 700; color: #fff; }
    header span { font-size: 11px; color: #555; }

    /* ── Canvas section (top, centered) ── */
    #canvas-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 12px 12px 6px;
      gap: 8px;
      min-height: 0;
    }

    #canvas-wrap {
      background: #161616;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid #222;
      flex-shrink: 0;
    }

    #trackCanvas { display: block; }

    #controls {
      display: flex;
      align-items: center;
      gap: 8px;
      width: min(960px, 100%);
      flex-wrap: wrap;
    }

    /* ── Bottom row ── */
    #bottom-row {
      display: flex;
      height: 270px;
      flex-shrink: 0;
      border-top: 1px solid #222;
    }

    button {
      background: #1e1e1e;
      color: #ccc;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 5px 12px;
      cursor: pointer;
      font-size: 12px;
      white-space: nowrap;
    }
    button:hover { background: #2a2a2a; }
    button.active { background: #004eaa; border-color: #0066cc; color: #fff; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    #scrubber { flex: 1; min-width: 60px; accent-color: #0066cc; cursor: pointer; }

    #timeDisplay {
      font-family: 'SF Mono', 'Menlo', monospace;
      font-size: 12px;
      color: #fff;
      min-width: 62px;
    }

    .speed-group { display: flex; align-items: center; gap: 5px; color: #555; }
    #speedSlider { width: 70px; accent-color: #0066cc; cursor: pointer; }
    #speedVal { color: #fff; min-width: 28px; }

    .section-title {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #444;
      margin-bottom: 6px;
    }

    /* ── Runner list (bottom-left) ── */
    #runner-section {
      flex: 1;
      overflow-y: auto;
      padding: 10px 14px;
      border-right: 1px solid #222;
    }

    #runner-section .section-title {
      position: sticky;
      top: 0;
      background: #0d0d0d;
      padding-bottom: 4px;
    }

    #runnerList {
      display: grid;
      grid-template-columns: 1fr 1fr;
      column-gap: 8px;
    }

    .runner-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 2px 0;
      cursor: pointer;
      user-select: none;
    }

    .runner-row input[type=checkbox] { cursor: pointer; flex-shrink: 0; }
    .color-swatch { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .runner-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .runner-meta { color: #444; font-size: 11px; white-space: nowrap; }

    /* ── Delta table (bottom-right) ── */
    #delta-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-height: 270px;
      overflow: hidden;
    }

    #delta-fixed {
      flex-shrink: 0;
      padding: 10px 14px 0;
      background: #0d0d0d;
      border-bottom: 1px solid #222;
    }

    #delta-fixed .section-title { margin-bottom: 4px; }

    #delta-scroll {
      flex: 1;
      overflow-y: auto;
      overflow-x: auto;
      padding: 0 14px 10px;
      min-height: 0;
    }

    .delta-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
      font-family: 'SF Mono', 'Menlo', monospace;
    }

    .delta-table th {
      padding: 4px 3px 2px;
      text-align: right;
      font-weight: normal;
      background: #0d0d0d;
      border-bottom: 1px solid #222;
      white-space: nowrap;
      overflow: hidden;
      max-width: 48px;
    }

    .delta-table th:first-child { text-align: left; color: #444; }

    .delta-table td {
      padding: 3px 3px;
      text-align: right;
      border-bottom: 1px solid #191919;
      color: #555;
    }

    .delta-table td:first-child { text-align: left; color: #444; }

    .delta-table tr.highlight { background: #0e1e30; }
    .delta-table tr.highlight td:first-child { color: #4a9eff; }

    .gap-leader { color: #aaa; }
    .gap-behind { color: #e07070; }
    .gap-ahead  { color: #6ecf8e; }
    .lap-split  { color: #484848; font-size: 10px; }

    /* ── Race selector ── */
    #race-selector { display: flex; gap: 6px; margin-left: auto; }
    .race-btn {
      background: #1e1e1e;
      color: #888;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 4px 14px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
    }
    .race-btn:hover { background: #2a2a2a; color: #ccc; }
    .race-btn.active { background: #004eaa; border-color: #0066cc; color: #fff; }

    /* ── Tab bar (mobile only) ── */
    #tab-bar { display: none; }

    /* ── Mobile layout ── */
    @media (max-width: 767px) {
      body {
        height: auto;
        min-height: 100dvh;
        overflow-y: auto;
      }

      header { padding: 7px 10px; flex-wrap: wrap; gap: 6px; }

      #canvas-section { flex: none; padding: 6px 0 4px; gap: 6px; }
      #canvas-wrap { border-radius: 0; border-left: none; border-right: none; }
      #controls { width: 100%; padding: 0 10px; box-sizing: border-box; }

      #bottom-row {
        flex-direction: column;
        height: auto;
        border-top: none;
        flex: none;
      }

      #tab-bar {
        display: flex;
        flex-shrink: 0;
        border-top: 1px solid #222;
        border-bottom: 1px solid #222;
      }
      .tab-btn {
        flex: 1;
        background: #161616;
        color: #666;
        border: none;
        border-right: 1px solid #222;
        border-radius: 0;
        padding: 10px;
        font-size: 13px;
        cursor: pointer;
      }
      .tab-btn:last-child { border-right: none; }
      .tab-btn.active { color: #fff; background: #0d0d0d; border-bottom: 2px solid #0066cc; }

      #runner-section {
        border-right: none;
        height: 260px;
        overflow-y: auto;
        flex-shrink: 0;
      }
      #delta-wrap {
        max-height: 270px;
        flex-shrink: 0;
      }
      .tab-hidden { display: none !important; }

      #runnerList { grid-template-columns: 1fr; }

      button, .race-btn { padding: 7px 14px; font-size: 13px; }
      #scrubber { min-width: 80px; }
    }
  </style>
</head>
<body>

<header>
  <h1>TrackCompare</h1>
  <span>Tucson Track Club Classic · March 21, 2026</span>
<div id="race-selector"></div>
</header>

<div id="canvas-section">
  <div id="canvas-wrap">
    <canvas id="trackCanvas"></canvas>
  </div>
  <div id="controls">
    <button id="playBtn">▶ Play</button>
    <button id="resetBtn">↺ Reset</button>
    <input type="range" id="scrubber" min="0" step="0.05" value="0">
    <span id="timeDisplay">0:00.0</span>
    <div class="speed-group">
      Speed
      <input type="range" id="speedSlider" min="1" max="60" value="10">
      <span id="speedVal">10×</span>
    </div>
  </div>
</div>

<div id="bottom-row">
  <div id="tab-bar">
    <button class="tab-btn active" data-tab="runners">Runners</button>
    <button class="tab-btn" data-tab="splits">Splits</button>
  </div>
  <div id="runner-section">
    <div class="section-title">Runners</div>
    <div id="runnerList"></div>
  </div>
  <div id="delta-wrap" class="tab-hidden">
    <div id="delta-fixed">
      <div class="section-title">Gap vs Leader</div>
      <table class="delta-table"><thead><tr id="deltaHead"></tr></thead></table>
    </div>
    <div id="delta-scroll">
      <table class="delta-table"><tbody id="deltaBody"></tbody></table>
    </div>
  </div>
</div>

<script src="races.js"></script>
<script>
// ═══════════════════════════════════════════════════════════
// COLORS
// ═══════════════════════════════════════════════════════════
const COLORS = [
  '#FFB347', // 1  Beau     – gold
  '#4FC3F7', // 2  Tucker   – sky blue
  '#81C784', // 3  Naoya    – green
  '#F48FB1', // 4  Sailor   – pink
  '#CE93D8', // 5  Annie    – purple
  '#80DEEA', // 6  Peter    – cyan
  '#FFCC02', // 7  Brian    – yellow
  '#FF8A65', // 8  Freddie  – orange
  '#A5D6A7', // 9  Thomas   – light green
  '#90CAF9', // 10 Ryan     – light blue
  '#BCAAA4', // 11 Camryn   – tan
  '#EF9A9A', // 12 Paul     – salmon
  '#B0BEC5', // 13 Payton   – blue-grey
  '#EEEEEE', // 14 David    – white
];

// ═══════════════════════════════════════════════════════════
// TRACK GEOMETRY  (canvas px — recomputed on resize)
// ═══════════════════════════════════════════════════════════
let W = 960, H = 410, canvasScale = 1;
let CX, CY, SL, TR, PERIM;

function computeGeometry() {
  CX = W / 2;
  CY = H / 2;
  canvasScale = Math.min(W / 960, H / 410);
  SL = Math.round(250 * canvasScale);
  TR = Math.round(130 * canvasScale);
  PERIM = 4 * SL + 2 * Math.PI * TR;
}

// trackPosLoop: takes a raw loop position (0–400m), no startOffset applied
function trackPosLoop(loopMeters) {
  const d = ((loopMeters % 400) + 400) % 400;
  const px = d * (PERIM / 400);

  // Counter-clockwise: top-left → bottom-left → bottom-right → top-right → top-left
  const s1 = Math.PI * TR;         // end of left curve  (~85m)
  const s2 = s1 + 2 * SL;          // end of bottom straight (= 200m exactly = finish)
  const s3 = s2 + Math.PI * TR;    // end of right curve  (~285m)
  // s4 = PERIM = end of top straight (= 400m, back to start)

  if (px <= s1) {
    // Left curve — counter-clockwise (top-left ↓ bottom-left, bulges left)
    const a = -Math.PI / 2 - px / TR;
    return { x: CX - SL + TR * Math.cos(a), y: CY + TR * Math.sin(a) };
  } else if (px <= s2) {
    // Bottom straight — going RIGHT
    return { x: CX - SL + (px - s1), y: CY + TR };
  } else if (px <= s3) {
    // Right curve — counter-clockwise (bottom-right ↑ top-right, bulges right)
    const a = Math.PI / 2 - (px - s2) / TR;
    return { x: CX + SL + TR * Math.cos(a), y: CY + TR * Math.sin(a) };
  } else {
    // Top straight — going LEFT
    return { x: CX + SL - (px - s3), y: CY - TR };
  }
}

// trackPos: takes a race distance (adds startOffset internally, for runner dots)
function trackPos(distMeters) {
  return trackPosLoop(distMeters + startOffset);
}

// ═══════════════════════════════════════════════════════════
// RACE CONFIG  (mutable — updated by loadRace)
// ═══════════════════════════════════════════════════════════
let startOffset  = 0;
let totalDist    = 5000;
let splitCount   = 13;
let totalLaps    = 13;
let SPLIT_DISTANCES = [];

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
let selected = new Set([0, 1, 2, 3, 4]);
let animTime  = 0;
let isPlaying = false;
let speed     = 10;
let lastTs    = null;
let rafId     = null;
let raceData  = [];
let maxTime   = 0;

// ─── Load a race from the RACES array ───────────────────────
function loadRace(race) {
  // Stop any running animation
  isPlaying = false;
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  lastTs = null;
  animTime = 0;

  // Apply race config
  SPLIT_DISTANCES = race.splitDistances;
  startOffset     = race.startOffset;
  totalDist       = SPLIT_DISTANCES[SPLIT_DISTANCES.length - 1];
  splitCount      = SPLIT_DISTANCES.length;
  // 5k has a 200m opener (half lap) → 12 full laps; mile has no opener → 4 laps
  const firstSplit = SPLIT_DISTANCES[0];
  totalLaps = firstSplit < 400
    ? Math.round((totalDist - firstSplit) / 400)   // e.g. (5000-200)/400 = 12
    : Math.floor(totalDist / 400);                 // e.g. floor(1609/400) = 4
  raceData        = race.runners.map(r => ({ ...r, cumSecs: r.cumulative.map(toSeconds) }));
  maxTime         = Math.max(...raceData.map(r => r.cumSecs[splitCount - 1]));
  selected        = new Set([0, 1, 2, 3, 4].filter(i => i < raceData.length));

  // Update scrubber range
  document.getElementById('scrubber').value = 0;
  document.getElementById('scrubber').max   = maxTime;
  document.getElementById('timeDisplay').textContent = '0:00.0';
  setPlayBtn(false);

  // Rebuild UI
  buildRunnerList();
  buildDeltaTable();
  drawFrame();
  updateHighlight();
}

// ─── Race selector buttons ────────────────────────────────
function buildRaceSelector() {
  const el = document.getElementById('race-selector');
  el.innerHTML = '';
  RACES.forEach(race => {
    const btn = document.createElement('button');
    btn.className = 'race-btn' + (race === RACES[0] ? ' active' : '');
    btn.textContent = race.label;
    btn.addEventListener('click', () => {
      el.querySelectorAll('.race-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      loadRace(race);
    });
    el.appendChild(btn);
  });
}

// ═══════════════════════════════════════════════════════════
// INTERPOLATION
// ═══════════════════════════════════════════════════════════
function runnerDist(r, T) {
  if (T <= 0) return 0;
  if (T >= r.cumSecs[splitCount - 1]) return totalDist;
  if (T <= r.cumSecs[0]) return (T / r.cumSecs[0]) * SPLIT_DISTANCES[0];
  for (let i = 0; i < splitCount - 1; i++) {
    if (T <= r.cumSecs[i + 1]) {
      const p = (T - r.cumSecs[i]) / (r.cumSecs[i + 1] - r.cumSecs[i]);
      return SPLIT_DISTANCES[i] + p * (SPLIT_DISTANCES[i + 1] - SPLIT_DISTANCES[i]);
    }
  }
  return totalDist;
}

// ═══════════════════════════════════════════════════════════
// CANVAS DRAWING
// ═══════════════════════════════════════════════════════════
const canvas = document.getElementById('trackCanvas');
const ctx    = canvas.getContext('2d');

function drawOval(lineWidth, color) {
  ctx.strokeStyle = color;
  ctx.lineWidth = lineWidth;
  ctx.lineCap = 'butt';
  ctx.beginPath();
  ctx.moveTo(CX - SL, CY - TR);                                  // top-left (start)
  ctx.arc(CX - SL, CY, TR, -Math.PI / 2, Math.PI / 2, true);    // left curve ↓ (CCW)
  ctx.lineTo(CX + SL, CY + TR);                                  // bottom straight →
  ctx.arc(CX + SL, CY, TR, Math.PI / 2, -Math.PI / 2, true);    // right curve ↑ (CCW)
  ctx.lineTo(CX - SL, CY - TR);                                  // top straight ←
  ctx.closePath();
  ctx.stroke();
}

// distM is a loop position (0–400m), not a race distance
function drawLapMark(distM, color, width, label) {
  const p = trackPosLoop(distM);
  const next = trackPosLoop(distM + 0.5);
  const dx = next.x - p.x, dy = next.y - p.y;
  const len = Math.sqrt(dx*dx + dy*dy) || 1;
  const nx = -dy/len * 10, ny = dx/len * 10;

  ctx.strokeStyle = color;
  ctx.lineWidth = width;
  ctx.beginPath();
  ctx.moveTo(p.x - nx, p.y - ny);
  ctx.lineTo(p.x + nx, p.y + ny);
  ctx.stroke();

  if (label) {
    ctx.font = '9px sans-serif';
    ctx.fillStyle = color;
    ctx.fillText(label, p.x + nx + 2, p.y + ny + 3);
  }
}

function drawFrame() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#161616';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Track layers
  drawOval(26, '#1a0800');   // border/shadow
  drawOval(22, '#cc5500');   // track surface (orange)
  drawOval(12, '#e06010');   // inner highlight

  // Infield
  const ir = TR - 11;
  ctx.fillStyle = '#1a2a1a';
  ctx.beginPath();
  ctx.moveTo(CX - SL, CY - ir);
  ctx.arc(CX - SL, CY, ir, -Math.PI / 2, Math.PI / 2, true);
  ctx.lineTo(CX + SL, CY + ir);
  ctx.arc(CX + SL, CY, ir, Math.PI / 2, -Math.PI / 2, true);
  ctx.lineTo(CX - SL, CY - ir);
  ctx.closePath();
  ctx.fill();

  // Start and finish markers — positions derived from startOffset and totalDist
  const startMark  = startOffset % 400;
  const finishMark = (startOffset + totalDist) % 400;
  drawLapMark(startMark,  '#ffffff', 2, 'START');
  drawLapMark(finishMark, '#FF4444', 2, 'FINISH');

  // Current standings in infield
  const order = [...selected]
    .map(i => ({ i, d: runnerDist(raceData[i], animTime) }))
    .sort((a, b) => b.d - a.d);

  const leaderD = order[0]?.d ?? 0;

  ctx.textBaseline = 'top';
  const ifSize = Math.max(7, Math.round(10 * canvasScale));
  const ifRow  = Math.round(ifSize * 1.4);
  const infieldX = CX - SL + Math.round(14 * canvasScale);
  const infieldY = CY - (order.length * ifRow) / 2;
  order.forEach(({ i, d }, rank) => {
    const r = raceData[i];
    const done = d >= totalDist;
    const gapM = leaderD - d; // meters behind leader

    ctx.font = `${rank === 0 ? 'bold ' : ''}${ifSize}px sans-serif`;
    ctx.fillStyle = done ? '#555' : COLORS[i];

    const namePart = `${rank + 1}. ${r.name.split(' ')[0]}${done ? ' ✓' : ''}`;
    ctx.fillText(namePart, infieldX, infieldY + rank * ifRow);

    // Gap in meters (skip for leader and at start)
    if (rank > 0 && gapM > 0.5 && animTime > 2) {
      const gapLabel = `-${gapM.toFixed(0)}m`;
      const gapSize = Math.max(6, Math.round(9 * canvasScale));
      ctx.font = `${gapSize}px monospace`;
      ctx.fillStyle = '#aa4444';
      const nameWidth = (() => {
        ctx.font = `${rank === 0 ? 'bold ' : ''}${ifSize}px sans-serif`;
        const w = ctx.measureText(namePart).width;
        ctx.font = `${gapSize}px monospace`;
        return w;
      })();
      ctx.fillText(gapLabel, infieldX + nameWidth + 4, infieldY + rank * ifRow + 1);
    }
  });

  // Runner dots (draw back-runners first so leaders render on top)
  [...order].reverse().forEach(({ i, d }) => {
    const pos = trackPos(d);
    const done = d >= 5000;

    ctx.beginPath();
    ctx.arc(pos.x, pos.y, Math.max(3, Math.round(6 * canvasScale)), 0, Math.PI * 2);
    ctx.fillStyle = done ? '#333' : COLORS[i];
    ctx.fill();
    ctx.strokeStyle = '#111';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  });

  // Race title — centered, pulled from active race config
  const activeRace = RACES.find(r => r.splitDistances === SPLIT_DISTANCES) || RACES[0];
  ctx.textBaseline = 'top';
  ctx.textAlign = 'center';
  ctx.font = 'bold 15px sans-serif';
  ctx.fillStyle = '#fff';
  ctx.fillText(activeRace.title, CX, 10);
  ctx.font = '11px sans-serif';
  ctx.fillStyle = '#888';
  ctx.fillText(activeRace.subtitle, CX, 29);
  ctx.textAlign = 'left';

  // Watermark (bottom-right) + version (bottom-left)
  ctx.textBaseline = 'bottom';
  ctx.font = '9px sans-serif';
  ctx.fillStyle = '#444';
  ctx.textAlign = 'right';
  ctx.fillText('Timing splits from Roadrunner Race Timing', W - 8, H - 4);
  ctx.fillText('Visualization created by: Tucker Creger', W - 8, H - 15);
  ctx.textAlign = 'left';
  ctx.fillText('v2.2', 8, H - 4);

  // Time + lap overlay (top-right)
  const leaderDist = runnerDist(raceData[0], animTime);
  const firstSplit = SPLIT_DISTANCES[0];
  const hasOpener  = firstSplit < 400;
  let lap;
  if (hasOpener) {
    // 5k: show 0 during the 200m opener, then count full 400m laps
    lap = leaderDist < firstSplit ? 0 : 1 + Math.floor((leaderDist - firstSplit) / 400);
  } else {
    // Mile: start at 1, advance every 400m
    lap = Math.floor(leaderDist / 400) + 1;
  }
  lap = Math.min(lap, totalLaps);
  ctx.textBaseline = 'top';
  ctx.font = 'bold 11px monospace';
  ctx.fillStyle = '#fff';
  const tStr = fmtTime(animTime);
  ctx.fillText(tStr, W - ctx.measureText(tStr).width - 10, 10);
  ctx.font = '10px sans-serif';
  ctx.fillStyle = '#555';
  ctx.fillText(`Lap ${lap} / ${totalLaps}`, W - 70, 24);
}

// ═══════════════════════════════════════════════════════════
// ANIMATION LOOP
// ═══════════════════════════════════════════════════════════
function tick(ts) {
  if (!isPlaying) return;
  if (lastTs === null) lastTs = ts;
  const dt = ((ts - lastTs) / 1000) * speed;
  lastTs = ts;

  animTime = Math.min(animTime + dt, maxTime);
  drawFrame();
  syncScrubber();
  updateHighlight();

  if (animTime >= maxTime) {
    isPlaying = false;
    setPlayBtn(false);
    lastTs = null;
  } else {
    rafId = requestAnimationFrame(tick);
  }
}

// ═══════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════
function fmtTime(s) {
  const m = Math.floor(s / 60);
  const rem = (s % 60).toFixed(1).padStart(4, '0');
  return `${m}:${rem}`;
}

function fmtInterval(secs) {
  const m = Math.floor(secs / 60);
  const s = (secs % 60).toFixed(1);
  return m > 0 ? `${m}:${s.padStart(4, '0')}` : s;
}

function fmtDelta(secs) {
  if (secs < 0.001) return '—';
  const sign = secs < 0 ? '−' : '+';
  const abs = Math.abs(secs);
  const m = Math.floor(abs / 60);
  const rem = (abs % 60).toFixed(3).padStart(6, '0');
  return m > 0 ? `${sign}${m}:${rem}` : `${sign}${rem}`;
}

function syncScrubber() {
  document.getElementById('scrubber').value = animTime;
  document.getElementById('timeDisplay').textContent = fmtTime(animTime);
}

function setPlayBtn(playing) {
  const btn = document.getElementById('playBtn');
  btn.textContent = playing ? '⏸ Pause' : '▶ Play';
  playing ? btn.classList.add('active') : btn.classList.remove('active');
}

// ═══════════════════════════════════════════════════════════
// UI: RUNNER LIST
// ═══════════════════════════════════════════════════════════
function buildRunnerList() {
  const list = document.getElementById('runnerList');
  list.innerHTML = '';
  raceData.forEach((r, i) => {
    const label = document.createElement('label');
    label.className = 'runner-row';
    label.innerHTML = `
      <input type="checkbox" ${selected.has(i) ? 'checked' : ''}>
      <span class="color-swatch" style="background:${COLORS[i]}"></span>
      <span class="runner-name">${r.name}</span>
      <span class="runner-meta">#${r.place} · ${r.finalTime}</span>
    `;
    label.querySelector('input').addEventListener('change', e => {
      e.target.checked ? selected.add(i) : selected.delete(i);
      buildDeltaTable();
      drawFrame();
    });
    list.appendChild(label);
  });
}

// ═══════════════════════════════════════════════════════════
// UI: DELTA TABLE
// ═══════════════════════════════════════════════════════════
function buildDeltaTable() {
  const sel = [...selected].sort((a, b) => a - b);
  const leaderSecs = raceData[0].cumSecs;

  document.getElementById('deltaHead').innerHTML =
    `<th>Split</th>` +
    sel.map(i =>
      `<th style="color:${COLORS[i]};max-width:44px;overflow:hidden">${raceData[i].name.split(' ')[0]}</th>`
    ).join('');

  document.getElementById('deltaBody').innerHTML =
    SPLIT_DISTANCES.map((dist, si) =>
      `<tr id="sr${si}">
        <td>${dist}m</td>
        ${sel.map(i => {
          const gap      = raceData[i].cumSecs[si] - leaderSecs[si];
          const prevSecs = si > 0 ? raceData[i].cumSecs[si - 1] : 0;
          const interval = raceData[i].cumSecs[si] - prevSecs;
          const lapTag   = ` <span class="lap-split">(${fmtInterval(interval)})</span>`;
          if (i === 0) return `<td class="gap-leader">${raceData[i].cumulative[si]}${lapTag}</td>`;
          if (gap < 0.001) return `<td class="gap-leader">${raceData[i].cumulative[si]}${lapTag}</td>`;
          return `<td class="gap-behind">${fmtDelta(gap)}${lapTag}</td>`;
        }).join('')}
      </tr>`
    ).join('');
}

function updateHighlight() {
  document.querySelectorAll('#deltaBody tr').forEach(r => r.classList.remove('highlight'));
  const leaderDist = runnerDist(raceData[0], animTime);
  let idx = -1;
  for (let i = 0; i < SPLIT_DISTANCES.length; i++) {
    if (leaderDist >= SPLIT_DISTANCES[i]) idx = i;
  }
  if (idx >= 0) {
    const row = document.getElementById(`sr${idx}`);
    if (row) {
      row.classList.add('highlight');
      // Pin highlighted row to top of the scrollable body.
      const scroll = document.getElementById('delta-scroll');
      const firstRow = scroll.querySelector('tbody tr');
      const rowH = firstRow ? firstRow.offsetHeight : 20;
      scroll.scrollTop = idx * rowH;
    }
  }
}

// ═══════════════════════════════════════════════════════════
// CONTROLS
// ═══════════════════════════════════════════════════════════
document.getElementById('playBtn').addEventListener('click', () => {
  isPlaying = !isPlaying;
  setPlayBtn(isPlaying);
  if (isPlaying) {
    if (animTime >= maxTime) animTime = 0;
    lastTs = null;
    rafId = requestAnimationFrame(tick);
  } else {
    cancelAnimationFrame(rafId);
    lastTs = null;
  }
});

document.getElementById('resetBtn').addEventListener('click', () => {
  isPlaying = false;
  cancelAnimationFrame(rafId);
  lastTs = null;
  animTime = 0;
  setPlayBtn(false);
  syncScrubber();
  drawFrame();
  updateHighlight();
});

document.getElementById('scrubber').addEventListener('input', e => {
  animTime = parseFloat(e.target.value);
  document.getElementById('timeDisplay').textContent = fmtTime(animTime);
  drawFrame();
  updateHighlight();
});

document.getElementById('speedSlider').addEventListener('input', e => {
  speed = parseInt(e.target.value);
  document.getElementById('speedVal').textContent = speed + '×';
});

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════

// Crisp rendering on retina/HiDPI displays, responsive on mobile
function scaleCanvas() {
  const dpr = window.devicePixelRatio || 1;
  const mobile = window.innerWidth < 768;
  W = mobile ? window.innerWidth : 960;
  H = mobile ? Math.round(W * 0.58) : 410;  // taller ratio gives oval room below the title
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.scale(dpr, dpr);
  computeGeometry();
}

// Rebuild canvas + redraw on window resize (debounced)
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => { scaleCanvas(); drawFrame(); }, 100);
});

// Tab switching (mobile)
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const tab = btn.dataset.tab;
    document.getElementById('runner-section').classList.toggle('tab-hidden', tab !== 'runners');
    document.getElementById('delta-wrap').classList.toggle('tab-hidden', tab !== 'splits');
  });
});

scaleCanvas();
buildRaceSelector();
loadRace(RACES[0]);
</script>
